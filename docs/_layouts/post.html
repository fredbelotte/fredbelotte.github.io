---
layout: base
---

<article class="hero-body">
  <div>
    <h1 class="title is-1">{{ page.title }}</h1>
    <h2 class="subtitle is-3">
      {{ page.date | date: "%d %B %Y" }} &Colon; {{ page.author }}
    </h2>

    <section class="tile is-6">
      <div class="content">{{ content }}</div>
    </section>
  </div>
</article>
