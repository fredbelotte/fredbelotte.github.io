---
title: blog
---

<section class="hero-body">
  <div>
    <h1 class="title is-1">{{ 'fred belotte' | downcase }}</h1>
    <h2 class="subtitle is-3">{{ 'content manager' | downcase }}</h2>

    <div class="field is-grouped">
      {% for post in site.posts %}
      <div class="control">
        <div class="tags are-medium are-rounded has-addons">
          <span class="tag is-black is-rounded"
            >{{ post.date | date: "%Y" }}</span
          >
          <a class="tag is-rounded" href="{{ post.url }}"
            >{{ post.date | date: "%d %B" }}</a
          >
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
